{% extends 'portal/dashboard.html' %}
{% block content %}
<div class="p-6 md:p-12">
    <h2 class="text-2xl font-black text-blue-900 uppercase mb-8">Official Results</h2>
    <div class="grid gap-4">
        {% for res in results %}
        <div class="flex justify-between items-center bg-white p-6 border-l-4 border-blue-900 shadow-sm">
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase">{{ res.unit_code }}</p>
                <p class="text-lg font-black text-blue-950">{{ res.unit_name }}</p>
            </div>
            <div class="text-right">
                <p class="text-2xl font-black text-blue-900">{{ res.marks }}%</p>
                <span class="px-3 py-1 bg-blue-100 text-blue-900 text-xs font-black rounded">{{ res.grade }}</span>
            </div>
        </div>
        {% empty %}
        <div class="p-12 text-center border-2 border-dashed">
            <p class="text-gray-400 font-bold uppercase text-xs">Results not yet published by the Registrar.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
